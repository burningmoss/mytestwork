<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◤ TETRIS ◢ – classic arcade</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(145deg, #0b0e18 0%, #1a1f2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        .game-container {
            background: rgba(10, 14, 23, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 2.5rem;
            padding: 1.8rem 2rem;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
            border: 1px solid #2e3a5c;
        }

        .main-panel {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        canvas#board {
            display: block;
            width: 300px;
            height: 600px;
            border-radius: 24px;
            background: #0f1322;
            box-shadow: inset 0 -4px 8px rgba(0, 0, 0, 0.6), 0 0 0 2px #2d3f66, 0 10px 20px rgba(0, 0, 0, 0.5);
            image-rendering: crisp-edges;
        }

        .info-panel {
            background: #0c1020;
            border-radius: 1.5rem;
            padding: 1rem 1rem 1.5rem;
            box-shadow: inset 0 1px 2px #4e6190, 0 15px 25px rgba(0, 0, 0, 0.6);
            border: 1px solid #32456b;
            min-width: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .score-card {
            background: #1a2338;
            border-radius: 1.2rem;
            padding: 0.6rem 1rem;
            width: 100%;
            text-align: center;
            border: 1px solid #4f6390;
            box-shadow: inset 0 2px 5px #00000055;
        }

        .score-label {
            color: #b7cdff;
            font-weight: 400;
            letter-spacing: 1.2px;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .score-value {
            color: #f2f9ff;
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.2;
            text-shadow: 0 0 8px #68aaff;
            font-family: 'Courier New', monospace;
            transition: transform 0.1s ease, color 0.1s ease;
            display: inline-block;
        }

        .score-value.pop {
            transform: scale(1.3);
            color: #ffd966;
            text-shadow: 0 0 15px #ffb700;
        }

        .next-container {
            background: #1a2338;
            border-radius: 1.5rem;
            padding: 0.8rem 0.8rem 1.2rem;
            width: 100%;
            border: 1px solid #4f6390;
            box-shadow: inset 0 2px 5px #00000055;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .next-label {
            color: #b0c8ff;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            margin-bottom: 0.5rem;
        }

        canvas#nextCanvas {
            display: block;
            width: 100px;
            height: 100px;
            background: #0b0f1c;
            border-radius: 16px;
            box-shadow: inset 0 0 0 1px #3f5182, 0 5px 10px black;
            image-rendering: crisp-edges;
            margin-bottom: 0.2rem;
        }

        .btn-new, .btn-pause {
            border: none;
            border-radius: 2.5rem;
            padding: 0.7rem 1.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: #eef5ff;
            letter-spacing: 1px;
            box-shadow: 0 6px 0 #12192c, 0 8px 15px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: all 0.08s linear;
            width: 100%;
            text-transform: uppercase;
            border: 1px solid #6a84c0;
        }

        .btn-new {
            background: #2e3d6b;
        }

        .btn-pause {
            background: #4a3f6b;
            border-color: #8f7ac0;
            box-shadow: 0 6px 0 #29203f, 0 8px 15px rgba(0, 0, 0, 0.5);
        }

        .btn-new:active, .btn-pause:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #12192c, 0 5px 15px black;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            width: 100%;
        }

        .controls {
            color: #9fb0e0;
            font-size: 0.8rem;
            margin-top: 0.3rem;
            text-align: center;
            background: #161e30;
            padding: 0.5rem 0.8rem;
            border-radius: 2rem;
            width: 100%;
            border: 1px solid #415985;
        }

        .controls span {
            color: #dbe6ff;
            font-weight: 600;
        }

        .status-text {
            font-size: 0.9rem;
            color: #f98f8f;
            font-weight: 500;
            min-height: 1.5rem;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="main-panel">
        <div class="board-section">
            <canvas id="board" width="300" height="600"></canvas>
        </div>

        <div class="info-panel">
            <div class="score-card">
                <div class="score-label">SCORE</div>
                <div class="score-value" id="scoreDisplay">0</div>
            </div>
            <div class="score-card">
                <div class="score-label">HIGH SCORE</div>
                <div class="score-value" id="highScoreDisplay">0</div>
            </div>

            <div class="next-container">
                <div class="next-label">NEXT</div>
                <canvas id="nextCanvas" width="120" height="120"></canvas>
                <div class="status-text" id="gameStatus"></div>
            </div>

            <div class="button-group">
                <button class="btn-new" id="newGameBtn">↻ NEW GAME</button>
                <button class="btn-pause" id="pauseBtn">PAUSE</button>
            </div>

            <div class="controls">
                <span>← →</span> move &nbsp;&nbsp; <span>↑</span> rotate <br>
                <span>↓</span> soft drop &nbsp; <span>␣</span> hard drop <br>
                <span>P</span> pause / resume
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- CONSTANTS ----------
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        const PREVIEW_SIZE = 20;

        const TETROMINOS = [
            { matrix: [[1,1,1,1]], color: '#3ec1d3' },
            { matrix: [[1,1],[1,1]], color: '#f6d365' },
            { matrix: [[0,1,0],[1,1,1]], color: '#b286fe' },
            { matrix: [[0,1,1],[1,1,0]], color: '#5cd6a2' },
            { matrix: [[1,1,0],[0,1,1]], color: '#fc7e6b' },
            { matrix: [[1,0,0],[1,1,1]], color: '#5d9df9' },
            { matrix: [[0,0,1],[1,1,1]], color: '#ffb347' }
        ];

        // ---------- GLOBAL STATE ----------
        let grid = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let activePiece = { matrix: [], color: '', x: 3, y: 0 };
        let nextPiece = null;
        let score = 0;
        let highScore = 0;
        let gameOver = false;
        let paused = false;

        // Visual effects
        let flashAlpha = 0.0;
        const FLASH_DECAY = 0.1;
        let particles = [];                // 爆炸粒子数组

        // Audio
        let audioCtx = null;

        // Timings
        const NORMAL_DROP_INTERVAL = 500;
        const SOFT_DROP_COOLDOWN = 70;
        const MOVE_COOLDOWN = 130;
        const ROTATE_COOLDOWN = 200;

        let lastNormalDrop = performance.now();
        let lastSoftDrop = performance.now();
        let lastLeftMove = performance.now();
        let lastRightMove = performance.now();
        let lastRotate = 0;

        const keys = { left: false, right: false, down: false, up: false, space: false };

        // DOM elements
        const boardCanvas = document.getElementById('board');
        const boardCtx = boardCanvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const highScoreSpan = document.getElementById('highScoreDisplay');
        const gameStatus = document.getElementById('gameStatus');
        const pauseBtn = document.getElementById('pauseBtn');

        // ---------- AUDIO : EXPLOSION ----------
        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {}
        }

        function playExplosionSound() {
            if (!audioCtx) initAudio();
            if (!audioCtx) return;

            const resumeAndPlay = () => {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => actuallyPlayExplosion());
                } else if (audioCtx.state === 'running') {
                    actuallyPlayExplosion();
                }
            };
            resumeAndPlay();
        }

        function actuallyPlayExplosion() {
            const now = audioCtx.currentTime;
            const bufferSize = 4096;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }

            const whiteNoise = audioCtx.createBufferSource();
            whiteNoise.buffer = noiseBuffer;
            whiteNoise.loop = true;

            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.4);

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1200, now);
            filter.frequency.exponentialRampToValueAtTime(150, now + 0.3);
            filter.Q.value = 2;

            whiteNoise.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            whiteNoise.start(now);
            whiteNoise.stop(now + 0.4);
        }

        // ---------- PARTICLES (visual explosion) ----------
        function createExplosionParticles(rows) {
            const colors = ['#ffaa00', '#ff6600', '#ff4400', '#ffffaa', '#ffffff', '#ff3366'];
            rows.forEach(row => {
                for (let i = 0; i < 10; i++) { // 每行10个粒子
                    const baseX = (Math.random() * COLS) * BLOCK_SIZE;
                    const baseY = row * BLOCK_SIZE + Math.random() * BLOCK_SIZE;
                    particles.push({
                        x: baseX,
                        y: baseY,
                        vx: (Math.random() - 0.5) * 5,
                        vy: (Math.random() - 1.2) * 3, // 向上扩散
                        life: 0.8 + Math.random() * 0.4,
                        maxLife: 1.0,
                        color: colors[Math.floor(Math.random() * colors.length)]
                    });
                }
            });
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08; // 轻微重力
                p.life -= 0.01;
                if (p.life <= 0 || p.y > ROWS * BLOCK_SIZE || p.x < -BLOCK_SIZE || p.x > COLS * BLOCK_SIZE + BLOCK_SIZE) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                const alpha = Math.min(p.life, 1);
                boardCtx.globalAlpha = alpha;
                boardCtx.fillStyle = p.color;
                boardCtx.shadowColor = '#fff';
                boardCtx.shadowBlur = 8;
                boardCtx.beginPath();
                boardCtx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                boardCtx.fill();
                boardCtx.shadowBlur = 0;
            });
            boardCtx.globalAlpha = 1;
        }

        // ---------- GAME LOGIC (unchanged except mergeAndReplace) ----------
        function loadHighScore() {
            try {
                const saved = localStorage.getItem('tetrisHighScore');
                if (saved) highScore = parseInt(saved, 10) || 0;
            } catch (e) {}
            highScoreSpan.innerText = highScore;
        }
        function saveHighScore() {
            if (score > highScore) {
                highScore = score;
                highScoreSpan.innerText = highScore;
                try {
                    localStorage.setItem('tetrisHighScore', highScore.toString());
                } catch (e) {}
            }
        }

        function animateScore() {
            scoreSpan.classList.add('pop');
            setTimeout(() => {
                scoreSpan.classList.remove('pop');
            }, 150);
        }

        function randomTetromino() {
            const idx = Math.floor(Math.random() * TETROMINOS.length);
            return { 
                matrix: TETROMINOS[idx].matrix.map(row => [...row]),
                color: TETROMINOS[idx].color 
            };
        }

        function spawnNewPiece() {
            if (!nextPiece) nextPiece = randomTetromino();
            activePiece.matrix = nextPiece.matrix.map(row => [...row]);
            activePiece.color = nextPiece.color;
            const width = activePiece.matrix[0].length;
            activePiece.x = Math.floor((COLS - width) / 2);
            activePiece.y = 0;
            nextPiece = randomTetromino();

            if (collision(activePiece.matrix, activePiece.x, activePiece.y)) {
                gameOver = true;
                gameStatus.innerText = 'GAME OVER';
                resetKeys();
            } else {
                gameStatus.innerText = paused ? 'PAUSED' : '';
            }
        }

        function collision(matrix, offX, offY) {
            for (let r = 0; r < matrix.length; r++) {
                for (let c = 0; c < matrix[0].length; c++) {
                    if (matrix[r][c] !== 0) {
                        const boardX = offX + c;
                        const boardY = offY + r;
                        if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) return true;
                        if (boardY >= 0 && grid[boardY][boardX] !== 0) return true;
                    }
                }
            }
            return false;
        }

        function mergeAndReplace() {
            // 先将当前活动方块固定到网格
            for (let r = 0; r < activePiece.matrix.length; r++) {
                for (let c = 0; c < activePiece.matrix[0].length; c++) {
                    if (activePiece.matrix[r][c] !== 0) {
                        const boardY = activePiece.y + r;
                        const boardX = activePiece.x + c;
                        if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            grid[boardY][boardX] = activePiece.color;
                        }
                    }
                }
            }

            // 消除满行并记录被消除的行号
            let rowsCleared = 0;
            let clearedRowIndices = [];
            for (let row = ROWS - 1; row >= 0; ) {
                if (grid[row].every(cell => cell !== 0)) {
                    clearedRowIndices.push(row);        // 记录原始行号
                    grid.splice(row, 1);
                    grid.unshift(new Array(COLS).fill(0));
                    rowsCleared++;
                    // 继续检查同一索引（原来的上一行）
                } else {
                    row--;
                }
            }

            if (rowsCleared > 0) {
                const points = [0, 100, 300, 600, 1000];
                const add = points[Math.min(rowsCleared, 4)];
                score += add;
                scoreSpan.innerText = score;
                animateScore();
                saveHighScore();

                // 视觉爆炸效果
                flashAlpha = 0.7;
                playExplosionSound();                   // 爆炸音效
                createExplosionParticles(clearedRowIndices); // 生成粒子
            }

            spawnNewPiece(); // 生成下一个方块
        }

        function movePiece(dx, dy) {
            if (gameOver || paused) return false;
            const newX = activePiece.x + dx;
            const newY = activePiece.y + dy;
            if (!collision(activePiece.matrix, newX, newY)) {
                activePiece.x = newX;
                activePiece.y = newY;
                return true;
            }
            if (dy === 1) {
                mergeAndReplace();
                lastNormalDrop = performance.now();
            }
            return false;
        }

        function moveDownAction() {
            if (gameOver || paused) return;
            if (!collision(activePiece.matrix, activePiece.x, activePiece.y + 1)) {
                activePiece.y++;
            } else {
                mergeAndReplace();
                lastNormalDrop = performance.now();
            }
        }

        function rotatePiece() {
            if (gameOver || paused) return;
            const matrix = activePiece.matrix;
            const rotated = matrix[0].map((_, idx) => matrix.map(row => row[idx]).reverse());
            if (!collision(rotated, activePiece.x, activePiece.y)) {
                activePiece.matrix = rotated;
            } else {
                if (!collision(rotated, activePiece.x - 1, activePiece.y)) {
                    activePiece.matrix = rotated;
                    activePiece.x -= 1;
                } else if (!collision(rotated, activePiece.x + 1, activePiece.y)) {
                    activePiece.matrix = rotated;
                    activePiece.x += 1;
                } else if (!collision(rotated, activePiece.x, activePiece.y - 1)) {
                    activePiece.matrix = rotated;
                    activePiece.y -= 1;
                }
            }
        }

        function hardDrop() {
            if (gameOver || paused) return;
            while (!collision(activePiece.matrix, activePiece.x, activePiece.y + 1)) {
                activePiece.y++;
            }
            mergeAndReplace();
            lastNormalDrop = performance.now();
        }

        function resetKeys() {
            keys.left = false;
            keys.right = false;
            keys.down = false;
            keys.up = false;
            keys.space = false;
        }

        function togglePause() {
            if (gameOver) return;
            paused = !paused;
            pauseBtn.innerText = paused ? 'RESUME' : 'PAUSE';
            if (paused) {
                gameStatus.innerText = 'PAUSED';
                resetKeys();
            } else {
                const now = performance.now();
                lastNormalDrop = now;
                lastSoftDrop = now;
                lastLeftMove = now;
                lastRightMove = now;
                lastRotate = now;
                resetKeys();
                gameStatus.innerText = '';
            }
        }

        function resetGame() {
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    grid[row][col] = 0;
                }
            }
            score = 0;
            scoreSpan.innerText = '0';
            gameOver = false;
            if (paused) {
                paused = false;
                pauseBtn.innerText = 'PAUSE';
            }
            gameStatus.innerText = '';
            resetKeys();
            particles = [];            // 清空粒子
            nextPiece = randomTetromino();
            spawnNewPiece();

            const now = performance.now();
            lastNormalDrop = now;
            lastSoftDrop = now;
            lastLeftMove = now;
            lastRightMove = now;
            lastRotate = now;
            flashAlpha = 0.0;
        }

        // ---------- RENDERING ----------
        function drawBoard() {
            boardCtx.clearRect(0, 0, 300, 600);

            // grid lines
            boardCtx.strokeStyle = '#2f3c62';
            boardCtx.lineWidth = 0.4;
            for (let i = 0; i <= COLS; i++) {
                boardCtx.beginPath();
                boardCtx.moveTo(i * BLOCK_SIZE, 0);
                boardCtx.lineTo(i * BLOCK_SIZE, 600);
                boardCtx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                boardCtx.beginPath();
                boardCtx.moveTo(0, i * BLOCK_SIZE);
                boardCtx.lineTo(300, i * BLOCK_SIZE);
                boardCtx.stroke();
            }

            // blocks
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const color = grid[row][col];
                    if (color !== 0) {
                        boardCtx.fillStyle = color;
                        boardCtx.shadowColor = 'rgba(255,255,255,0.3)';
                        boardCtx.shadowBlur = 8;
                        boardCtx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-1, BLOCK_SIZE-1);
                        boardCtx.shadowBlur = 0;
                        boardCtx.fillStyle = 'rgba(255,255,255,0.15)';
                        boardCtx.fillRect(col * BLOCK_SIZE+2, row * BLOCK_SIZE+2, BLOCK_SIZE-5, 2);
                    }
                }
            }

            // active piece
            if (activePiece && !gameOver) {
                for (let r = 0; r < activePiece.matrix.length; r++) {
                    for (let c = 0; c < activePiece.matrix[0].length; c++) {
                        if (activePiece.matrix[r][c] !== 0) {
                            const x = (activePiece.x + c) * BLOCK_SIZE;
                            const y = (activePiece.y + r) * BLOCK_SIZE;
                            boardCtx.fillStyle = activePiece.color;
                            boardCtx.shadowColor = '#fff3';
                            boardCtx.shadowBlur = 10;
                            boardCtx.fillRect(x, y, BLOCK_SIZE-1, BLOCK_SIZE-1);
                            boardCtx.shadowBlur = 0;
                            boardCtx.fillStyle = 'rgba(255,255,255,0.3)';
                            boardCtx.fillRect(x+3, y+3, BLOCK_SIZE-8, 3);
                        }
                    }
                }
            }

            // flash overlay (white flash)
            if (flashAlpha > 0) {
                boardCtx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
                boardCtx.fillRect(0, 0, 300, 600);
                flashAlpha = Math.max(0, flashAlpha - FLASH_DECAY);
            }

            // particles (drawn above flash)
            drawParticles();

            // game over overlay
            if (gameOver) {
                boardCtx.globalAlpha = 0.5;
                boardCtx.fillStyle = '#0b0e18';
                boardCtx.fillRect(0, 0, 300, 600);
                boardCtx.globalAlpha = 1;
                boardCtx.font = 'bold 28px "Segoe UI", monospace';
                boardCtx.fillStyle = '#ffcaca';
                boardCtx.shadowColor = '#ff000080';
                boardCtx.shadowBlur = 16;
                boardCtx.fillText('GAME OVER', 25, 320);
                boardCtx.shadowBlur = 0;
            }

            // status text update
            if (gameOver) {
                gameStatus.innerText = 'GAME OVER';
            } else if (paused) {
                gameStatus.innerText = 'PAUSED';
            } else {
                gameStatus.innerText = '';
            }
        }

        function drawNext() {
            nextCtx.clearRect(0, 0, 120, 120);
            nextCtx.fillStyle = '#0b0f1c';
            nextCtx.fillRect(0, 0, 120, 120);
            if (nextPiece) {
                const matrix = nextPiece.matrix;
                const color = nextPiece.color;
                const cols = matrix[0].length;
                const rows = matrix.length;
                const offsetX = (5 - cols) * PREVIEW_SIZE / 2;
                const offsetY = (5 - rows) * PREVIEW_SIZE / 2;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (matrix[r][c]) {
                            nextCtx.fillStyle = color;
                            nextCtx.shadowBlur = 10;
                            nextCtx.shadowColor = '#aaa';
                            nextCtx.fillRect(offsetX + c * PREVIEW_SIZE, offsetY + r * PREVIEW_SIZE, PREVIEW_SIZE-2, PREVIEW_SIZE-2);
                            nextCtx.shadowBlur = 0;
                            nextCtx.fillStyle = 'rgba(255,255,255,0.2)';
                            nextCtx.fillRect(offsetX + c * PREVIEW_SIZE+3, offsetY + r * PREVIEW_SIZE+3, PREVIEW_SIZE-8, 3);
                        }
                    }
                }
            }
        }

        // ---------- GAME LOOP ----------
        function gameLoop(now) {
            requestAnimationFrame(gameLoop);

            // 更新粒子（不受暂停影响，让爆炸动画继续）
            updateParticles();

            if (!gameOver && !paused) {
                if (now - lastNormalDrop >= NORMAL_DROP_INTERVAL) {
                    moveDownAction();
                    lastNormalDrop = now;
                }
                if (keys.down && (now - lastSoftDrop >= SOFT_DROP_COOLDOWN)) {
                    moveDownAction();
                    lastSoftDrop = now;
                }
                if (keys.left && (now - lastLeftMove >= MOVE_COOLDOWN)) {
                    movePiece(-1, 0);
                    lastLeftMove = now;
                }
                if (keys.right && (now - lastRightMove >= MOVE_COOLDOWN)) {
                    movePiece(1, 0);
                    lastRightMove = now;
                }
            }

            drawBoard();
            drawNext();
        }

        // ---------- EVENT HANDLERS ----------
        function handleKeyDown(e) {
            const key = e.key;
            if (key === ' ' || key.startsWith('Arrow')) e.preventDefault();

            if (key.toLowerCase() === 'p') {
                e.preventDefault();
                togglePause();
                return;
            }

            if (gameOver || paused) return;

            switch (key) {
                case 'ArrowLeft': keys.left = true; break;
                case 'ArrowRight': keys.right = true; break;
                case 'ArrowDown': keys.down = true; break;
                case 'ArrowUp':
                    const now = performance.now();
                    if (now - lastRotate > ROTATE_COOLDOWN) {
                        rotatePiece();
                        lastRotate = now;
                    }
                    break;
                case ' ':
                    hardDrop();
                    break;
                default: return;
            }
        }

        function handleKeyUp(e) {
            const key = e.key;
            if (key === ' ' || key.startsWith('Arrow')) e.preventDefault();
            if (key.toLowerCase() === 'p') return;
            if (gameOver || paused) return;

            switch (key) {
                case 'ArrowLeft': keys.left = false; break;
                case 'ArrowRight': keys.right = false; break;
                case 'ArrowDown': keys.down = false; break;
                default: return;
            }
        }

        window.addEventListener('blur', () => resetKeys());

        document.getElementById('newGameBtn').addEventListener('click', () => {
            initAudio();
            resetGame();
        });

        pauseBtn.addEventListener('click', () => {
            initAudio();
            togglePause();
        });

        window.addEventListener('keydown', () => {
            initAudio();
        }, { once: true });

        loadHighScore();
        resetGame();
        requestAnimationFrame(gameLoop);

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
    })();
</script>
</body>
</html>
